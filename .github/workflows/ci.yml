name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Backend — lint, types, tests
# Activates once backend/pyproject.toml + backend/uv.lock exist (T0.2+).
# ---------------------------------------------------------------------------
jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nbaforecast_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
          uv-version: "0.11.25"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --group dev --extra explain

      - name: Ruff — lint
        run: uv run ruff check src tests

      - name: Ruff — format
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src

      - name: pytest
        # Exit code 5 = "no tests collected" (e.g. a milestone before its tests land); not a failure.
        run: |
          set +e
          uv run pytest tests/ -v --tb=short
          code=$?
          if [ "$code" -eq 5 ]; then echo "::notice::no tests collected"; exit 0; fi
          exit "$code"
        env:
          NBAF_POSTGRES_URL: postgresql+asyncpg://postgres:test@localhost:5432/nbaforecast_test
          NBAF_REDIS_URL: redis://localhost:6379/0
          NBAF_ENV: test

  # ---------------------------------------------------------------------------
  # Frontend — lint, types, tests, build, OpenAPI drift check
  # TODO(frontend, M2): RE-ENABLE — remove the `if: false` below.
  # Disabled 2026-06-30: the T0.5 scaffold's package.json does not define the
  # lint / type-check / test / generate-api-client scripts this job calls, and the
  # OpenAPI drift check needs the generated client that lands in M2 (T2.15). Until the
  # frontend toolchain is wired, this job can't pass; it is skipped so it doesn't block
  # backend PRs. Re-enable (and finish the scripts) when frontend work starts at M2.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    if: false  # TODO(frontend, M2): remove to re-enable — see note above
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda  # v4.1.0
        with:
          version: 10

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm type-check

      - name: Vitest
        run: pnpm test --run

      - name: Build
        run: pnpm build

      - name: OpenAPI codegen drift check
        run: |
          pnpm generate-api-client
          git diff --exit-code -- lib/api-client

  # ---------------------------------------------------------------------------
  # Build Docker images (main branch only; activates once Dockerfiles exist).
  # Only runs when both upstream jobs succeeded or were skipped — never on failure.
  # ---------------------------------------------------------------------------
  build-images:
    name: Build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: |
      github.ref == 'refs/heads/main' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            -f infra/docker/Dockerfile.backend \
            -t nbaforecast-backend:${{ github.sha }} \
            .

      - name: Build frontend image
        if: hashFiles('infra/docker/Dockerfile.frontend') != ''
        run: |
          docker build \
            -f infra/docker/Dockerfile.frontend \
            -t nbaforecast-frontend:${{ github.sha }} \
            .
