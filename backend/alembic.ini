# Alembic configuration for NBAforecast.
# The database URL is injected at runtime from Settings (NBAF_POSTGRES_URL) in alembic/env.py;
# it is intentionally NOT stored here so no connection string is committed.
[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os
# Readable, sortable migration filenames: <NNNN>_<slug>.py
file_template = %%(rev)s_%%(slug)s
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
