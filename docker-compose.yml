# NBAforecast — local development stack.
#
# Prerequisites:
#   - Docker Desktop running
#   - .env file present (copy .env.example → .env and fill in any overrides)
#
# Usage:
#   docker-compose up                                 # infra + API
#   docker-compose --profile workers up               # + Prefect worker (M1+)
#   docker-compose --profile live up                  # + live poller (M4+)
#   docker-compose --profile with-frontend up         # + Next.js dev server (T0.5+)
#
# Ports:
#   5432  Postgres
#   6379  Redis
#   9000  MinIO S3 API
#   9001  MinIO console  (http://localhost:9001  user: minioadmin / minioadmin)
#   5000  MLflow UI      (http://localhost:5000)
#   8000  FastAPI        (http://localhost:8000/docs)
#   3000  Next.js        (http://localhost:3000, with-frontend profile only)

name: nbaforecast

# Shared env block for api / worker / poller — each service merges this anchor
# and adds any service-specific keys on top.
x-backend-env: &backend-env
  NBAF_POSTGRES_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nbaforecast
  NBAF_REDIS_URL: redis://redis:6379/0
  NBAF_S3_ENDPOINT_URL: http://minio:9000
  NBAF_S3_ACCESS_KEY: minioadmin
  NBAF_S3_SECRET_KEY: minioadmin
  NBAF_MLFLOW_TRACKING_URI: http://mlflow:5000
  NBAF_ENV: development

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nbaforecast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates the 'mlflow' database alongside 'nbaforecast' on first boot.
      # MLflow needs its own namespace; sharing the app DB pollutes Alembic's schema.
      - ./infra/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nbaforecast"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # mc is bundled in the minio server image; 'local' alias is pre-configured
      # by the server at startup so no alias-set step is needed.
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: creates the artifact bucket if it doesn't already exist.
  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # $$ so the container shell expands these (single-$ is interpolated by compose
        # from the HOST env at parse time, which is blank → mc runs unauthenticated).
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/nbaforecast &&
        echo 'MinIO bucket nbaforecast ready.'
    restart: "no"

  mlflow:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # ENTRYPOINT in Dockerfile.mlflow is already ["mlflow"], so command must
    # begin with the sub-command (server), not the binary name again.
    command:
      - server
      - --backend-store-uri
      - postgresql+psycopg2://postgres:postgres@postgres:5432/mlflow
      - --default-artifact-root
      - s3://nbaforecast
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      # MLflow ≥3 rejects Host headers outside localhost/private IPs (DNS-rebinding
      # protection); the api container calls it via the compose hostname (M3.5).
      - --allowed-hosts
      - "mlflow:5000,mlflow,localhost:5000,localhost,127.0.0.1:5000"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Backend services ──────────────────────────────────────────────────────────
  #
  # All three share the same dev image.  Source is mounted read-only so code
  # changes are picked up without a rebuild.  The entrypoints
  # (nbaforecast-api, nbaforecast-worker, nbaforecast-poller) are created in
  # T0.4 (api) and later milestones (worker, poller).
  #
  # Until the entrypoints exist, these containers will crash on startup —
  # that is expected and will resolve as each task is completed.

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *backend-env
      NBAF_API_HOST: "0.0.0.0"
      NBAF_API_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/backend/src:ro
    command: ["nbaforecast-api"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Profile: workers — activate after M1 (Prefect flows exist)
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev.backend
    profiles: [workers]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *backend-env
    volumes:
      - ./backend/src:/app/backend/src:ro
    command: ["nbaforecast-worker"]

  # Profile: live — activate after M4 (live poller exists)
  poller:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev.backend
    profiles: [live]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
    volumes:
      - ./backend/src:/app/backend/src:ro
    command: ["nbaforecast-poller"]

  # ── Frontend ──────────────────────────────────────────────────────────────────
  # Profile: with-frontend — activate after T0.5 (Next.js scaffold exists)
  #
  # NEXT_PUBLIC_API_URL is correct for browser-side fetch (calls come from the
  # user's machine).  SSR calls (server-side, inside the container) need an
  # internal URL — add INTERNAL_API_URL=http://api:8000 in T0.5 when wiring
  # getServerSideProps / Server Components.

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev.frontend
    profiles: [with-frontend]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend:delegated
      - frontend_node_modules:/app/frontend/node_modules
      - frontend_next:/app/frontend/.next

volumes:
  postgres_data:
  redis_data:
  minio_data:
  frontend_node_modules:
  frontend_next:
