# Root-level tool configuration for the NBAforecast monorepo.
# The installable Python package lives in backend/pyproject.toml.

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific rules
    "S",    # flake8-bandit (security)
    "PIE",  # flake8-pie
    "PT",   # flake8-pytest-style
]
ignore = [
    "S104",   # binding 0.0.0.0 — fine in Docker
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["S101", "S105", "S106"]  # asserts + hardcoded test creds OK
"backend/src/nbaforecast/api/**/*.py" = ["B008"]  # FastAPI Depends() in defaults

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = true
namespace_packages = true
explicit_package_bases = true
mypy_path = ["backend/src"]
plugins   = ["pydantic.mypy"]

# Stubs / third-party with missing types
[[tool.mypy.overrides]]
module = [
    "nba_api.*",
    "pbpstats.*",
    "requests.*",
    "boto3.*",
    "botocore.*",
    "pyarrow.*",
    "mlflow.*",
    "shap.*",
    "pandera.*",
    "lightgbm.*",
    "xgboost.*",
    "prefect.*",
    "sklearn.*",
    "joblib.*",
]
ignore_missing_imports = true
